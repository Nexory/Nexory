name: Update contribution card

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # SHA-pinned for supply-chain hygiene. Update via Dependabot or by
      # bumping the SHA to the new HEAD of Nexory/gh-contrib-stats main.
      - uses: Nexory/gh-contrib-stats@360a1d2d65daac8832c4ea77321711bd035abf81
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: Nexory
          output_path: card.svg
