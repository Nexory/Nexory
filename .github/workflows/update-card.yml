name: Update contribution card

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # SHA-pinned for supply-chain hygiene. Update via Dependabot or by
      # bumping the SHA to the new HEAD of Nexory/BugMergeStats main.
      - uses: Nexory/BugMergeStats@2c5e9e7cf54833a20754fa1e4f1c98b269ed2f5f
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: Nexory
          output_path: card.svg
